name: Feature request
description: Suggest an improvement for Laravel RabbitMQ
title: "[Feature]: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please explain the use case before the implementation details.
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to accomplish?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility impact
      description: Mention affected PHP, Laravel, RabbitMQ, or ext-amqp versions if known.
    validations:
      required: false
