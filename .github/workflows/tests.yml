name: Tests

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]
  workflow_dispatch:

env:
  COMPOSER_PROCESS_TIMEOUT: 0
  COMPOSER_NO_INTERACTION: 1
  COMPOSER_NO_AUDIT: 1

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [8.2, 8.3, 8.4]
        laravel: ['11.*', '12.*', '13.*']
        rabbitmq: ['3.13']
        include:
          - php: 8.2
            dependency: prefer-stable
          - php: 8.4
            dependency: prefer-lowest

    name: PHP ${{ matrix.php }} + RMQ ${{ matrix.rabbitmq }} + Laravel ${{ matrix.laravel }}

    services:
      rabbitmq:
        image: rabbitmq:${{ matrix.rabbitmq }}-management
        env:
          RABBITMQ_DEFAULT_USER: laravel
          RABBITMQ_DEFAULT_PASS: secret
          RABBITMQ_DEFAULT_VHOST: b2b-field
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: amqp

      - name: Install Dependencies
        run: |
          composer update --${{ matrix.dependency || 'prefer-stable' }} --no-progress --no-interaction

      - name: Run Tests
        env:
          RABBITMQ_HOST: 127.0.0.1
        run: ./run-tests.sh
