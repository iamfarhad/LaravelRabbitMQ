name: Tests

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]
  workflow_dispatch:

env:
  COMPOSER_PROCESS_TIMEOUT: 0
  COMPOSER_NO_INTERACTION: 1
  COMPOSER_NO_AUDIT: 1

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [ '8.2', '8.3', '8.4', '8.5' ]
        laravel: [ '11.*', '12.*', '13.*' ]
        dependency-version: [ prefer-lowest, prefer-stable ]
        include:
          - laravel: '13.*'
            testbench: '11.*'
          - laravel: '12.*'
            testbench: '10.*'
          - laravel: '11.*'
            testbench: '9.*'

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }} - ${{ matrix.dependency-version }}

    services:
      rabbitmq:
        image: rabbitmq:3-management
        env:
          RABBITMQ_DEFAULT_USER: laravel
          RABBITMQ_DEFAULT_PASS: secret
          RABBITMQ_DEFAULT_VHOST: b2b-field
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo, amqp

      - name: Install dependencies
        run: |
          composer require "illuminate/console:${{ matrix.laravel }}" "illuminate/database:${{ matrix.laravel }}" "illuminate/filesystem:${{ matrix.laravel }}" --no-update
          composer require "orchestra/testbench:${{ matrix.testbench }}" --dev --no-update
          composer update --${{ matrix.dependency-version }} --prefer-dist --no-progress --with-all-dependencies

      - name: Clear PHPUnit cache
        run: |
          rm -rf .phpunit.cache
          rm -rf .phpunit.result.cache

      - name: Wait for RabbitMQ
        run: |
          echo "Waiting for RabbitMQ to be ready..."
          for i in {1..30}; do
            if curl -f http://localhost:15672/api/overview -u laravel:secret >/dev/null 2>&1; then
              echo "RabbitMQ is ready!"
              exit 0
            fi
            echo "Attempt $i/30: RabbitMQ not ready yet, waiting..."
            sleep 2
          done
          echo "RabbitMQ did not become ready in time"
          exit 1

      - name: Verify RabbitMQ
        run: |
          echo "RabbitMQ Status:"
          curl -u laravel:secret http://localhost:15672/api/overview 2>/dev/null | jq -r '.rabbitmq_version // "Unable to get version"'
          echo "Available vhosts:"
          curl -u laravel:secret http://localhost:15672/api/vhosts 2>/dev/null | jq -r '.[].name // "Unable to get vhosts"'

      - name: Run tests
        env:
          RABBITMQ_HOST: 127.0.0.1
          RABBITMQ_PORT: 5672
          RABBITMQ_USER: laravel
          RABBITMQ_PASSWORD: secret
          RABBITMQ_VHOST: b2b-field
        run: ./run-tests.sh
